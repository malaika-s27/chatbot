# Render Blueprint for Pakistan Railway Chatbot
# Backend-only deployment configuration

services:
  - type: web
    name: pak-railway-chatbot-backend
    runtime: python
    plan: free
    env: python

    buildCommand: >
      cd backend &&
      pip install --upgrade pip &&
      pip install -r requirements-prod.txt

    startCommand: >
      cd backend &&
      PYTHONPATH=$PYTHONPATH:. uvicorn app.main:app --host 0.0.0.0 --port $PORT

    envVars:
      # Python Configuration
      - key: PYTHON_VERSION
        value: 3.9.0

      - key: PORT
        value: 8000

      # Prevent tokenizer parallelism warnings/issues
      - key: TOKENIZERS_PARALLELISM
        value: false

      # Optional cache optimization for transformers
      - key: HF_HOME
        value: /tmp

      - key: TRANSFORMERS_CACHE
        value: /tmp

      # Pinecone Configuration
      - key: PINECONE_API_KEY
        sync: false

      - key: PINECONE_ENVIRONMENT
        sync: false

      - key: PINECONE_INDEX_NAME
        sync: false

      - key: PINECONE_DIMENSION
        sync: false

      # Groq Configuration
      - key: GROQ_API_KEY
        sync: false

      - key: GROQ_MODEL
        sync: false

      # Embedding Model
      - key: EMBEDDING_MODEL
        sync: false

      # API Configuration
      - key: API_HOST
        value: 0.0.0.0

      - key: API_PORT
        value: 8000

      # Retrieval Configuration
      - key: MAX_RETRIEVED_DOCS
        value: 5
